services:
  # ── Backend API ─────────────────────────────────────────
  # NOTE: DB is now hosted on AWS RDS (external).
  # Set DB_HOST, DB_USER, DB_PASSWORD, DB_NAME in server/.env on your EC2.
  server:
    image: panduranga0811/jansamadhan-server-v2:latest
    container_name: jansamadhan-server-v2
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      NODE_ENV: production
    ports:
      - "5000:5000"
    networks:
      - jansamadhan-net

  # ── Frontend (Nginx) ───────────────────────────────────
  client:
    image: panduranga0811/jansamadhan-client-v2:latest
    container_name: jansamadhan-client-v2
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    networks:
      - jansamadhan-net

networks:
  jansamadhan-net:
    driver: bridge
