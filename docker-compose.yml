services:
  # ── MySQL Database ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: jansamadhan-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required in server/.env}
      MYSQL_DATABASE: ${DB_NAME:-jansamadhan}
      MYSQL_USER: ${DB_USER:-jan_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in server/.env}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - jansamadhan-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend API ─────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jansamadhan-server-v2
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      NODE_ENV: production
      DB_HOST: db
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jansamadhan-net

  # ── Frontend (Nginx) ───────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ""
    container_name: jansamadhan-client-v2
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
    networks:
      - jansamadhan-net

networks:
  jansamadhan-net:
    driver: bridge

volumes:
  mysql_data:
    driver: local
